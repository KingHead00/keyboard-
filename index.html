<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeSpeed Pro</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --text-color: #646669;
            --sub-color: #d1d0c5;
            --error-color: #ca4754;
            --correct-color: #4caf50;
        }

        body {
            background-color: var(--bg-color);
            color: var(--sub-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        #stats {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 1.5rem;
            color: var(--main-color);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #timer-select {
            display: flex;
            gap: 6px;
            font-size: 0.95rem;
        }

        .timer-option {
            background: none;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 4px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .timer-option:hover {
            color: var(--sub-color);
            border-color: var(--sub-color);
        }

        .timer-option.active {
            color: var(--bg-color);
            background-color: var(--main-color);
            border-color: var(--main-color);
        }

        #text-display {
            font-size: 1.8rem;
            line-height: 2.4rem;
            letter-spacing: 1px;
            word-break: break-word;
            position: relative;
            user-select: none;
            margin-bottom: 30px;
            height: 7.2rem;
            overflow: hidden;
        }

        .char {
            color: var(--text-color);
            position: relative;
        }

        .char.correct {
            color: var(--correct-color);
        }

        .char.corrected {
            color: var(--main-color);
        }

        .char.incorrect {
            color: var(--error-color);
            background-color: rgba(202, 71, 84, 0.2);
        }

        .char.current {
            color: var(--sub-color);
        }

        .char.current::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 2px;
            height: 100%;
            background-color: var(--main-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        #input-field {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        #restart-btn {
            background: none;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        #restart-btn:hover {
            color: var(--main-color);
            border-color: var(--main-color);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">
        <div>WPM: <span id="wpm">0</span></div>
        <div>Accuracy: <span id="accuracy">100</span>%</div>
        <div>True Accuracy: <span id="true-accuracy">100</span>%</div>
        <div>Time: <span id="time">30</span>s</div>
        <div id="timer-select">
            <button class="timer-option" data-time="15">15s</button>
            <button class="timer-option active" data-time="30">30s</button>
            <button class="timer-option" data-time="60">60s</button>
            <button class="timer-option" data-time="120">120s</button>
            <button class="timer-option" data-time="forever">∞</button>
        </div>
    </div>

    <div id="text-display"></div>
    <input type="text" id="input-field" autofocus>

    <button id="restart-btn">Restart</button>
</div>

<script>
    // Word pool used to generate an endless stream of text
    const wordPool = (
        "the quick brown fox jumps over lazy dog success is not final failure " +
        "not fatal it courage to continue that counts be or to that question " +
        "whether tis nobler in mind suffer all glitters gold often have you " +
        "heard told middle of difficulty lies opportunity look closer and find " +
        "it time flies like an arrow fruit banana practice makes perfect every " +
        "moment counts toward mastery keep calm carry on knowledge power stay " +
        "focused stay curious never give up small steps lead big changes clear " +
        "mind sharp fingers steady pace wins race patience discipline consistency " +
        "words flow like river language beauty precision speed accuracy balance " +
        "focus rhythm flow state deep work quiet room bright screen soft click " +
        "typing test challenge fun learning growth improve daily habit build skill"
    ).split(" ");

    const textDisplay = document.getElementById('text-display');
    const inputField = document.getElementById('input-field');
    const wpmSpan = document.getElementById('wpm');
    const accuracySpan = document.getElementById('accuracy');
    const trueAccuracySpan = document.getElementById('true-accuracy');
    const timeSpan = document.getElementById('time');
    const restartBtn = document.getElementById('restart-btn');
    const timerOptions = document.querySelectorAll('.timer-option');

    let timer = null;
    let maxTime = 30;
    let timeLeft = maxTime;
    let isForever = false;
    let elapsedSeconds = 0;
    let isTyping = false;
    let charIndex = 0;
    let mistakes = 0;

    // These only ever go up, even if you backspace and fix a mistake,
    // so "true accuracy" reflects every keystroke you actually made.
    let totalKeystrokes = 0;
    let totalCorrectKeystrokes = 0;

    // How many extra words to keep buffered ahead of the cursor
    const BUFFER_WORDS = 40;

    function randomWord() {
        return wordPool[Math.floor(Math.random() * wordPool.length)];
    }

    function appendWords(count) {
        // If the display already has content, add a space before new words
        let needsLeadingSpace = textDisplay.childElementCount > 0;
        let fragment = document.createDocumentFragment();
        for (let w = 0; w < count; w++) {
            if (needsLeadingSpace || w > 0) {
                let spaceSpan = document.createElement('span');
                spaceSpan.className = 'char';
                spaceSpan.innerText = ' ';
                fragment.appendChild(spaceSpan);
            }
            const word = randomWord();
            word.split("").forEach(ch => {
                let span = document.createElement('span');
                span.className = 'char';
                span.innerText = ch;
                fragment.appendChild(span);
            });
        }
        textDisplay.appendChild(fragment);
    }

    function ensureBuffer() {
        const characters = textDisplay.querySelectorAll('span');
        // If we're getting close to the end of the generated text, add more
        if (characters.length - charIndex < 60) {
            appendWords(BUFFER_WORDS);
        }
    }

    function trimPastText() {
        // Remove characters well behind the cursor so the DOM doesn't grow forever
        const KEEP_BEHIND = 200;
        if (charIndex > KEEP_BEHIND) {
            const characters = textDisplay.querySelectorAll('span');
            const removeCount = charIndex - KEEP_BEHIND;
            for (let i = 0; i < removeCount; i++) {
                if (characters[i]) characters[i].remove();
            }
            charIndex -= removeCount;
        }
    }

    function initText() {
        textDisplay.innerHTML = "";
        appendWords(BUFFER_WORDS);
        const spans = textDisplay.querySelectorAll('span');
        spans[0].classList.add('current');
        scrollToCurrent();
    }

    function scrollToCurrent() {
        const current = textDisplay.querySelector('.current');
        if (current) {
            const containerTop = textDisplay.getBoundingClientRect().top;
            const currentTop = current.getBoundingClientRect().top;
            const offset = currentTop - containerTop;
            const lineHeight = 2.4 * 16; // matches CSS line-height in px (approx, 1rem = 16px)
            if (offset > lineHeight) {
                textDisplay.scrollTop += lineHeight;
            } else if (offset < 0) {
                textDisplay.scrollTop = Math.max(0, textDisplay.scrollTop + offset);
            }
        }
    }

    function isTimeUp() {
        return !isForever && timeLeft <= 0;
    }

    function getElapsed() {
        return isForever ? elapsedSeconds : (maxTime - timeLeft);
    }

    function updateStats() {
        let elapsed = getElapsed();
        let wpm = Math.round((((charIndex - mistakes) / 5) / elapsed) * 60);
        wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
        wpmSpan.innerText = wpm;

        let acc = Math.round(((charIndex - mistakes) / charIndex) * 100);
        accuracySpan.innerText = charIndex === 0 ? 100 : (acc < 0 ? 0 : acc);

        let trueAcc = Math.round((totalCorrectKeystrokes / totalKeystrokes) * 100);
        trueAccuracySpan.innerText = totalKeystrokes === 0 ? 100 : (trueAcc < 0 ? 0 : trueAcc);
    }

    function handleBackspace() {
        if (isTimeUp()) return;
        if (charIndex > 0) {
            let characters = textDisplay.querySelectorAll('span');
            characters[charIndex].classList.remove('current');
            charIndex--;
            if (characters[charIndex].classList.contains('incorrect')) {
                mistakes--;
            }
            characters[charIndex].classList.remove('correct', 'incorrect', 'corrected');
            characters[charIndex].classList.add('current');
            scrollToCurrent();
            updateStats();
        }
    }

    function handleKeydown(e) {
        if (e.key === 'Backspace') {
            e.preventDefault();
            handleBackspace();
        }
    }

    function initTyping() {
        let characters = textDisplay.querySelectorAll('span');
        let typedChar = inputField.value.split("")[inputField.value.length - 1];

        if (!isTimeUp()) {
            if (!isTyping) {
                timer = setInterval(startTimer, 1000);
                isTyping = true;
            }

            if (typedChar != null) {
                const alreadyCounted = characters[charIndex].dataset.trueCounted === 'true';
                if (characters[charIndex].innerText === typedChar) {
                    if (!alreadyCounted) {
                        totalKeystrokes++;
                        totalCorrectKeystrokes++;
                        characters[charIndex].dataset.trueCounted = 'true';
                    }
                    if (characters[charIndex].dataset.everWrong === 'true') {
                        characters[charIndex].classList.add('corrected');
                    } else {
                        characters[charIndex].classList.add('correct');
                    }
                } else {
                    if (!alreadyCounted) {
                        totalKeystrokes++;
                        characters[charIndex].dataset.trueCounted = 'true';
                    }
                    mistakes++;
                    characters[charIndex].classList.add('incorrect');
                    characters[charIndex].dataset.everWrong = 'true';
                }
                characters[charIndex].classList.remove('current');
                charIndex++;
                ensureBuffer();
                trimPastText();
                characters = textDisplay.querySelectorAll('span');
                if (characters[charIndex]) {
                    characters[charIndex].classList.add('current');
                }
                scrollToCurrent();
            }

            // Clear the input field so it never grows unbounded (text is infinite)
            inputField.value = "";

            updateStats();
        } else {
            clearInterval(timer);
            inputField.value = "";
        }
    }

    function startTimer() {
        if (isForever) {
            elapsedSeconds++;
            timeSpan.innerText = elapsedSeconds;
        } else if (timeLeft > 0) {
            timeLeft--;
            timeSpan.innerText = timeLeft;
        } else {
            clearInterval(timer);
            inputField.blur();
        }
    }

    function resetGame() {
        clearInterval(timer);
        timeLeft = maxTime;
        elapsedSeconds = 0;
        charIndex = 0;
        mistakes = 0;
        totalKeystrokes = 0;
        totalCorrectKeystrokes = 0;
        isTyping = false;
        inputField.value = "";
        timeSpan.innerText = isForever ? 0 : timeLeft;
        wpmSpan.innerText = 0;
        accuracySpan.innerText = 100;
        trueAccuracySpan.innerText = 100;
        initText();
        inputField.focus();
    }

    function selectTimer(value) {
        if (value === 'forever') {
            isForever = true;
            maxTime = Infinity;
        } else {
            isForever = false;
            maxTime = value;
        }
        timerOptions.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.time === String(value));
        });
        resetGame();
    }

    // Event Listeners
    inputField.addEventListener('input', initTyping);
    inputField.addEventListener('keydown', handleKeydown);
    restartBtn.addEventListener('click', resetGame);
    timerOptions.forEach(btn => {
        btn.addEventListener('click', () => {
            const val = btn.dataset.time === 'forever' ? 'forever' : parseInt(btn.dataset.time, 10);
            selectTimer(val);
        });
    });
    document.addEventListener('click', () => inputField.focus());

    // Initialize
    initText();
</script>

</body>
</html>
